name: mix

on:
  pull_request:
  push:
    branches: [master]
  schedule:
    - cron: "21 9 * * *"

jobs:
  test:
    runs-on: ubuntu-latest
    name: "test @ elixir:${{ matrix.elixir }} otp:${{ matrix.otp }} duckdb:${{ matrix.duckdb }} ${{ matrix.dialyzer && ' +dialyzer' || '' }}${{ matrix.lint && ' +lint' || '' }}"

    env:
      MIX_ENV: test

    strategy:
      matrix:
        duckdb: ["1.5.4"]
        include:
          # some old elixir version with the minimum supported OTP
          # see https://hexdocs.pm/elixir/compatibility-and-deprecations.html#between-elixir-and-erlang-otp
          - elixir: "1.17"
            otp: "26"
          # the latest versions with all static checks
          - elixir: ">0"
            otp: ">0"
            dialyzer: true
            lint: true

    steps:
      - uses: actions/checkout@v7

      - id: beam
        uses: erlef/setup-beam@v1
        with:
          elixir-version: ${{ matrix.elixir }}
          otp-version: ${{ matrix.otp }}

      - name: Restore deps cache
        uses: actions/cache@v6
        with:
          path: |
            deps
            _build
          key: test-${{ steps.beam.outputs.elixir-version }}-${{ github.head_ref || github.ref }}-${{ hashFiles('**/mix.lock') }}
          restore-keys: |
            test-${{ steps.beam.outputs.elixir-version }}-${{ github.head_ref || github.ref }}-
            test-${{ steps.beam.outputs.elixir-version }}-refs/heads/master-

      - run: |
          curl -L https://github.com/duckdb/duckdb/releases/download/v${{ matrix.duckdb }}/libduckdb-linux-amd64.zip -o libduckdb.zip
          unzip libduckdb.zip -d libduckdb

      - run: mix deps.get --only $MIX_ENV
        if: ${{ !matrix.lint }}

      - run: mix deps.get --check-locked
        if: ${{ matrix.lint }}

      - run: mix deps.unlock --check-unused
        if: ${{ matrix.lint }}

      - run: mix compile --warnings-as-errors
        env:
          DUXDB_CFLAGS: -I./libduckdb/
          DUXDB_LDFLAGS: -L./libduckdb -Wl,-rpath=./libduckdb

      - run: mix format --check-formatted
        if: ${{ matrix.lint }}

      - run: mix test

      - name: Restore PLTs cache
        if: ${{ matrix.dialyzer }}
        uses: actions/cache@v6
        with:
          path: plts
          key: plts-${{ steps.beam.outputs.elixir-version }}-${{ github.head_ref || github.ref }}
          restore-keys: |
            plts-${{ steps.beam.outputs.elixir-version }}-refs/heads/master

      - run: mix dialyzer --format github
        if: ${{ matrix.dialyzer }}
